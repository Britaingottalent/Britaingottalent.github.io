<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeyondCrypto · KYC Pending</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-bg: #0a1129;
            --accent: #00c774;
            --accent-secondary: #7c3aed;
            --text-primary: #e2e8f0;
            --text-secondary: #8b939f;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background: var(--primary-bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Page Loader (exactly like dashboard) ── */
        .page-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--primary-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .page-loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-spinner {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 25px;
        }

        .loader-spinner .ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--accent);
            border-bottom-color: var(--accent-secondary);
            animation: spin-ring 1s linear infinite;
        }

        .loader-spinner .ring:nth-child(2) {
            width: 70%;
            height: 70%;
            top: 15%;
            left: 15%;
            border-top-color: var(--accent-secondary);
            border-bottom-color: var(--accent);
            animation-duration: 1.4s;
            animation-direction: reverse;
        }

        .loader-spinner .ring:nth-child(3) {
            width: 50%;
            height: 50%;
            top: 25%;
            left: 25%;
            border-top-color: var(--text-secondary);
            border-bottom-color: var(--accent);
            animation-duration: 1.8s;
        }

        @keyframes spin-ring {
            to { transform: rotate(360deg); }
        }

        .loader-brand {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(90deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-top: 10px;
        }

        /* ── Main content (centered message) ── */
        .main-content {
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        .main-content.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .kyc-icon {
            font-size: 4rem;
            color: var(--accent);
            margin-bottom: 20px;
            animation: pulse-icon 1.2s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .kyc-title {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--text-primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .kyc-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            max-width: 400px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    <!-- Page Loader (identical to dashboard) -->
    <div class="page-loader" id="pageLoader">
        <div class="loader-spinner">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
        </div>
        <div class="loader-brand">BeyondCrypto</div>
    </div>

    <!-- Main Content (initially hidden) -->
    <div class="main-content" id="mainContent">
        <div class="kyc-icon">
            <i class="fas fa-user-clock"></i>
        </div>
        <div class="kyc-title">Waiting KYC Approval</div>
        <p class="kyc-subtitle">Your identity verification is under review. This usually takes 24–48 hours. You'll be notified once approved.</p>
    </div>

    <script>
        const pageLoader = document.getElementById('pageLoader');
        const mainContent = document.getElementById('mainContent');

        // Simulate loader for 2.5 seconds, then fade out and show content
        window.addEventListener('load', function() {
            setTimeout(function() {
                // Hide loader
                pageLoader.classList.add('hidden');
                // Show main content after a tiny delay to sync with transition
                setTimeout(function() {
                    mainContent.classList.add('visible');
                }, 300);
            }, 2500); // loader duration
        });
    </script>
</body>
</html>
